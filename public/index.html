<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meenakshi's Pottery — UCP Demo</title>
    <script src="https://pay.google.com/gp/p/js/pay.js" async></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg: #f5f0ea;
            --bg-chat: #ffffff;
            --bg-sidebar: #1a1a1a;
            --bg-api: #1e1e2e;
            --accent: #c96442;
            --accent-light: #f4e8e1;
            --accent-dark: #a14e30;
            --user-bubble: #c96442;
            --agent-bubble: #f5f0ea;
            --system-bubble: #fef7e0;
            --text: #2d2d2d;
            --text-light: #6b6b6b;
            --text-white: #ffffff;
            --border: #e5ddd5;
            --green: #4caf50;
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        .app {
            display: grid;
            grid-template-columns: 260px 1fr 360px;
            grid-template-rows: 1fr;
            height: 100vh;
        }

        /* ---- LEFT SIDEBAR ---- */
        .sidebar {
            background: var(--bg-sidebar);
            color: #ccc;
            display: flex;
            flex-direction: column;
            padding: 1.25rem;
        }
        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-brand .logo {
            width: 36px; height: 36px;
            background: var(--accent);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; color: #fff; font-weight: 700;
            flex-shrink: 0;
        }
        .sidebar-brand .name {
            font-size: 0.95rem; font-weight: 600; color: #fff; line-height: 1.2;
        }
        .sidebar-brand .name small {
            font-size: 0.7rem; color: #888; font-weight: 400; display: block;
        }

        .sidebar-section-label {
            font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em;
            color: #555; margin: 0.75rem 0 0.4rem 0.25rem;
        }

        /* ---- ANIMATED SVG FLOW INFOGRAPHIC ---- */
        .flow-infographic {
            flex: 1;
            padding: 0;
            overflow: hidden;
            position: relative;
        }
        .flow-infographic svg {
            width: 100%;
            height: 100%;
        }
        /* Particle animation along paths */
        @keyframes dashFlow {
            to { stroke-dashoffset: -20; }
        }
        @keyframes particleMove {
            0% { offset-distance: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { offset-distance: 100%; opacity: 0; }
        }
        @keyframes nodeGlow {
            0%, 100% { filter: drop-shadow(0 0 3px rgba(201,100,66,0.4)); }
            50% { filter: drop-shadow(0 0 8px rgba(201,100,66,0.8)); }
        }
        @keyframes nodeDoneGlow {
            0%, 100% { filter: drop-shadow(0 0 2px rgba(76,175,80,0.3)); }
            50% { filter: drop-shadow(0 0 5px rgba(76,175,80,0.6)); }
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 0.75rem;
            border-top: 1px solid rgba(255,255,255,0.08);
            font-size: 0.68rem;
            color: #555;
            line-height: 1.5;
        }
        .sidebar-footer .env-badge {
            display: inline-block;
            background: #f9ab00;
            color: #000;
            padding: 0.12rem 0.45rem;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.6rem;
            margin-bottom: 0.35rem;
        }

        /* ---- CENTER: CHAT AREA ---- */
        .chat-area {
            display: flex;
            flex-direction: column;
            background: var(--bg-chat);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            height: 100vh;
            min-height: 0;
            overflow: hidden;
        }
        .chat-header {
            padding: 0.65rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: #fff;
            flex-shrink: 0;
        }
        .chat-header .avatar {
            width: 30px; height: 30px;
            background: var(--accent);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; color: #fff; font-weight: 600;
        }
        .chat-header .info h3 { font-size: 0.85rem; font-weight: 600; }
        .chat-header .info p { font-size: 0.68rem; color: var(--text-light); }

        .chat-messages {
            flex: 1 1 0;
            min-height: 0;
            overflow-y: auto;
            padding: 1rem 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            scroll-behavior: smooth;
        }

        /* ---- CHAT MESSAGES ---- */
        .msg { max-width: 88%; animation: fadeIn 0.25s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
        .msg.user { align-self: flex-end; }
        .msg.agent { align-self: flex-start; }
        .msg.system { align-self: center; max-width: 100%; }
        .msg-label { font-size: 0.65rem; font-weight: 600; color: var(--text-light); margin-bottom: 0.2rem; padding: 0 0.2rem; }
        .msg.user .msg-label { text-align: right; }
        .msg-bubble {
            padding: 0.6rem 0.85rem;
            border-radius: var(--radius);
            font-size: 0.84rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .msg.user .msg-bubble { background: var(--user-bubble); color: var(--text-white); border-bottom-right-radius: 4px; }
        .msg.agent .msg-bubble { background: var(--agent-bubble); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .msg.system .msg-bubble { background: var(--system-bubble); color: #8a6d00; font-size: 0.75rem; text-align: center; border-radius: 8px; padding: 0.45rem 0.75rem; }
        .msg.success .msg-bubble { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; text-align: center; border-radius: 10px; padding: 0.65rem; }
        .msg.success .msg-bubble h3 { font-size: 1rem; margin-bottom: 0.15rem; }
        .msg.success .msg-bubble .confetti { font-size: 1.2rem; margin-bottom: 0.1rem; line-height: 1; }

        /* ---- INLINE PRODUCT CARDS ---- */
        .chat-products { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.4rem; margin-top: 0.3rem; }
        .chat-product {
            background: #fff; border: 1.5px solid var(--border); border-radius: 8px;
            padding: 0.4rem 0.35rem; cursor: pointer; transition: all 0.15s; text-align: center;
        }
        .chat-product:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(201,100,66,0.12); }
        .chat-product.selected { border-color: var(--accent); background: var(--accent-light); }
        .chat-product .prod-emoji { font-size: 1.4rem; margin-bottom: 0.1rem; line-height: 1; }
        .chat-product .prod-name { font-size: 0.68rem; font-weight: 600; line-height: 1.2; }
        .chat-product .prod-price { font-size: 0.75rem; font-weight: 700; color: var(--accent); margin-top: 0.05rem; }
        .chat-product .prod-sku { font-size: 0.55rem; color: var(--text-light); margin-top: 0.05rem; }

        /* ---- COMPACT CHECKOUT FORM ---- */
        .chat-checkout { background: #fff; border: 1.5px solid var(--border); border-radius: 8px; padding: 0.45rem; margin-top: 0.2rem; }
        .chat-checkout h4 { font-size: 0.72rem; font-weight: 600; margin-bottom: 0.2rem; color: var(--accent-dark); }
        .ck-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.15rem 0.25rem; margin-bottom: 0.15rem; }
        .ck-row.triple { grid-template-columns: 1fr 1fr 1fr; }
        .ck-row.full { grid-template-columns: 1fr; }
        .ck-group label { font-size: 0.58rem; color: var(--text-light); display: block; margin-bottom: 0; line-height: 1.4; }
        .ck-group input, .ck-group select {
            width: 100%; padding: 0.22rem 0.35rem; border: 1px solid var(--border);
            border-radius: 5px; font-size: 0.72rem; font-family: inherit; outline: none; transition: border 0.15s;
        }
        .ck-group input:focus, .ck-group select:focus { border-color: var(--accent); }
        .ck-promo-row { display: flex; gap: 0.2rem; margin: 0; }
        .ck-promo-row input { flex: 1; padding: 0.22rem 0.35rem; border: 1px solid var(--border); border-radius: 5px; font-size: 0.68rem; font-family: inherit; outline: none; }
        .ck-promo-row button {
            padding: 0.22rem 0.45rem; border: 1px solid var(--border); border-radius: 5px;
            background: #fff; font-size: 0.65rem; cursor: pointer; font-family: inherit; white-space: nowrap;
        }
        .ck-promo-row button:hover { background: var(--accent-light); }
        .ck-summary { background: var(--bg); border-radius: 6px; padding: 0.3rem 0.4rem; margin-top: 0.2rem; }
        .ck-summary-row { display: flex; justify-content: space-between; font-size: 0.68rem; padding: 0.04rem 0; }
        .ck-summary-row.total { font-weight: 700; font-size: 0.78rem; border-top: 1.5px solid var(--border); padding-top: 0.2rem; margin-top: 0.1rem; }
        .ck-summary-row.discount { color: var(--green); }
        .ck-gpay { margin-top: 0.25rem; display: flex; justify-content: center; }

        /* ---- INPUT BAR ---- */
        .chat-input-bar {
            padding: 0.6rem 1.25rem;
            border-top: 1px solid var(--border);
            background: #fff;
            display: flex;
            gap: 0.6rem;
            align-items: center;
            flex-shrink: 0;
        }
        .chat-input-bar input {
            flex: 1; padding: 0.55rem 0.85rem; border: 1px solid var(--border);
            border-radius: 24px; font-size: 0.84rem; font-family: inherit; outline: none; background: var(--bg);
        }
        .chat-input-bar input:focus { border-color: var(--accent); }
        .chat-input-bar button {
            width: 34px; height: 34px; border-radius: 50%; background: var(--accent);
            color: #fff; border: none; cursor: pointer; font-size: 1rem;
            display: flex; align-items: center; justify-content: center; transition: background 0.15s;
        }
        .chat-input-bar button:hover { background: var(--accent-dark); }

        /* ---- RIGHT: API LOG ---- */
        .api-panel { background: var(--bg-api); color: #a8e6cf; display: flex; flex-direction: column; overflow: hidden; }
        .api-panel-header {
            padding: 0.7rem 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.08);
            font-size: 0.78rem; font-weight: 600; color: #ffd93d;
            display: flex; align-items: center; gap: 0.4rem;
        }
        .api-log-entries {
            flex: 1; overflow-y: auto; padding: 0.4rem;
            font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 0.68rem; line-height: 1.5;
        }
        .log-entry { padding: 0.45rem 0.4rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .log-entry .le-head { display: flex; align-items: center; gap: 0.35rem; flex-wrap: wrap; }
        .log-entry .method { color: #c792ea; font-weight: 700; }
        .log-entry .url { color: #82aaff; }
        .log-entry .status-ok { color: #c3e88d; }
        .log-entry .status-err { color: #ff5370; }
        .log-entry .timing { color: #636e72; }
        .log-entry .body { color: #a6accd; font-size: 0.62rem; margin-top: 0.2rem; max-height: 100px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }

        /* ---- SCROLLBAR ---- */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }
        .api-log-entries::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); }

        /* ---- TYPING ---- */
        .typing-indicator .msg-bubble { display: flex; gap: 4px; padding: 0.65rem 1rem; }
        .typing-dot { width: 6px; height: 6px; background: #aaa; border-radius: 50%; animation: typingBounce 1.2s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.15s; }
        .typing-dot:nth-child(3) { animation-delay: 0.3s; }
        @keyframes typingBounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }

        /* ---- RESPONSIVE ---- */
        @media (max-width: 1100px) { .app { grid-template-columns: 1fr 280px; } .sidebar { display: none; } }
        @media (max-width: 768px) {
            .app { grid-template-columns: 1fr; }
            .api-panel { display: none; }
            .chat-header { padding: 0.4rem 0.65rem; }
            .chat-header .avatar { width: 26px; height: 26px; font-size: 0.7rem; }
            .chat-header .info h3 { font-size: 0.8rem; }
            .chat-header .info p { font-size: 0.6rem; }
            .chat-messages { padding: 0.5rem; gap: 0.4rem; }
            .msg { max-width: 95%; }
            .msg-label { font-size: 0.58rem; margin-bottom: 0.1rem; }
            .msg-bubble { padding: 0.4rem 0.6rem; font-size: 0.78rem; }
            .msg.system .msg-bubble { padding: 0.3rem 0.5rem; font-size: 0.68rem; }
            .chat-input-bar { padding: 0.4rem 0.5rem; }
            .chat-input-bar input { padding: 0.45rem 0.65rem; font-size: 0.8rem; }
            .chat-input-bar button { width: 30px; height: 30px; font-size: 0.9rem; }
            .chat-products { grid-template-columns: repeat(3, 1fr); gap: 0.25rem; }
            .chat-product { padding: 0.25rem 0.2rem; border-radius: 6px; }
            .chat-product .prod-emoji { font-size: 1.1rem; margin-bottom: 0; }
            .chat-product .prod-name { font-size: 0.58rem; }
            .chat-product .prod-price { font-size: 0.66rem; }
            .chat-product .prod-sku { display: none; }
            .msg-bubble.bubble-form { padding: 0.1rem !important; }
            .chat-checkout { padding: 0.3rem; border-radius: 6px; }
            .chat-checkout h4 { font-size: 0.65rem; margin-bottom: 0.1rem; }
            .ck-row { gap: 0.08rem 0.15rem; margin-bottom: 0.08rem; }
            .ck-row.triple { gap: 0.08rem 0.1rem; }
            .ck-group label { font-size: 0.52rem; line-height: 1; margin-bottom: 0; }
            .ck-group input, .ck-group select { padding: 0.2rem 0.25rem; font-size: 0.68rem; border-radius: 4px; }
            .ck-promo-row { gap: 0.15rem; }
            .ck-promo-row input { padding: 0.18rem 0.25rem; font-size: 0.65rem; }
            .ck-promo-row button { padding: 0.18rem 0.35rem; font-size: 0.6rem; }
            .ck-summary { padding: 0.25rem 0.3rem; margin-top: 0.15rem; border-radius: 5px; }
            .ck-summary-row { font-size: 0.62rem; padding: 0.03rem 0; }
            .ck-summary-row.total { font-size: 0.72rem; padding-top: 0.15rem; margin-top: 0.08rem; }
            .ck-gpay { margin-top: 0.2rem; }
            .msg.success .msg-bubble { padding: 0.4rem; }
            .msg.success .msg-bubble h3 { font-size: 0.85rem; margin-bottom: 0.1rem; }
            .msg.success .msg-bubble .confetti { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="app">

    <!-- LEFT SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <div class="logo">M</div>
            <div class="name">
                Meenakshi's Pottery
                <small>UCP Checkout Demo</small>
            </div>
        </div>

        <div class="sidebar-section-label">Checkout Flow</div>

        <!-- Animated SVG Flow Infographic -->
        <div class="flow-infographic" id="flowInfographic">
            <svg viewBox="0 0 230 520" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <!-- Gradient for active paths -->
                    <linearGradient id="activeGrad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#c96442" stop-opacity="0.2"/>
                        <stop offset="50%" stop-color="#c96442" stop-opacity="1"/>
                        <stop offset="100%" stop-color="#c96442" stop-opacity="0.2"/>
                    </linearGradient>
                    <linearGradient id="doneGrad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#4caf50" stop-opacity="0.2"/>
                        <stop offset="50%" stop-color="#4caf50" stop-opacity="1"/>
                        <stop offset="100%" stop-color="#4caf50" stop-opacity="0.2"/>
                    </linearGradient>
                    <!-- Glow filters -->
                    <filter id="glowActive"><feGaussianBlur stdDeviation="3" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                    <filter id="glowDone"><feGaussianBlur stdDeviation="2" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                </defs>

                <!-- Connection paths (background) -->
                <path id="path-1" d="M 35 60 C 35 75, 35 75, 35 90" stroke="#333" stroke-width="2" fill="none"/>
                <path id="path-2" d="M 35 145 C 35 160, 35 160, 35 175" stroke="#333" stroke-width="2" fill="none"/>
                <path id="path-3" d="M 35 230 C 35 245, 35 245, 35 260" stroke="#333" stroke-width="2" fill="none"/>
                <path id="path-4" d="M 35 315 C 35 330, 35 330, 35 345" stroke="#333" stroke-width="2" fill="none"/>
                <path id="path-5" d="M 35 400 C 35 415, 35 415, 35 430" stroke="#333" stroke-width="2" fill="none"/>

                <!-- Animated flowing particles on paths -->
                <g id="particles">
                    <!-- These get activated by JS -->
                </g>

                <!-- Step 1: UCP Discovery -->
                <g id="svg-discovery" class="svg-node" transform="translate(0, 20)">
                    <circle cx="35" cy="25" r="16" fill="#333" stroke="#555" stroke-width="1.5"/>
                    <text x="35" y="29" text-anchor="middle" fill="#888" font-size="11" font-weight="600">1</text>
                    <text x="58" y="22" fill="#777" font-size="10.5" font-weight="500">UCP Discovery</text>
                    <text x="58" y="34" fill="#555" font-size="8">GET /.well-known/ucp</text>
                </g>

                <!-- Step 2: Product Catalog -->
                <g id="svg-catalog" class="svg-node" transform="translate(0, 105)">
                    <circle cx="35" cy="25" r="16" fill="#333" stroke="#555" stroke-width="1.5"/>
                    <text x="35" y="29" text-anchor="middle" fill="#888" font-size="11" font-weight="600">2</text>
                    <text x="58" y="22" fill="#777" font-size="10.5" font-weight="500">Product Catalog</text>
                    <text x="58" y="34" fill="#555" font-size="8">GET /api/products</text>
                </g>

                <!-- Step 3: Create Session -->
                <g id="svg-session" class="svg-node" transform="translate(0, 190)">
                    <circle cx="35" cy="25" r="16" fill="#333" stroke="#555" stroke-width="1.5"/>
                    <text x="35" y="29" text-anchor="middle" fill="#888" font-size="11" font-weight="600">3</text>
                    <text x="58" y="22" fill="#777" font-size="10.5" font-weight="500">Create Session</text>
                    <text x="58" y="34" fill="#555" font-size="8">POST /checkout-sessions</text>
                </g>

                <!-- Step 4: Configure Order -->
                <g id="svg-configure" class="svg-node" transform="translate(0, 275)">
                    <circle cx="35" cy="25" r="16" fill="#333" stroke="#555" stroke-width="1.5"/>
                    <text x="35" y="29" text-anchor="middle" fill="#888" font-size="11" font-weight="600">4</text>
                    <text x="58" y="22" fill="#777" font-size="10.5" font-weight="500">Configure Order</text>
                    <text x="58" y="34" fill="#555" font-size="8">PUT /checkout-sessions/:id</text>
                </g>

                <!-- Step 5: Google Pay -->
                <g id="svg-gpay" class="svg-node" transform="translate(0, 360)">
                    <circle cx="35" cy="25" r="16" fill="#333" stroke="#555" stroke-width="1.5"/>
                    <text x="35" y="29" text-anchor="middle" fill="#888" font-size="11" font-weight="600">5</text>
                    <text x="58" y="22" fill="#777" font-size="10.5" font-weight="500">Google Pay</text>
                    <text x="58" y="34" fill="#555" font-size="8">Token via MPGS gateway</text>
                </g>

                <!-- Step 6: Order Complete -->
                <g id="svg-complete" class="svg-node" transform="translate(0, 445)">
                    <circle cx="35" cy="25" r="16" fill="#333" stroke="#555" stroke-width="1.5"/>
                    <text x="35" y="29" text-anchor="middle" fill="#888" font-size="11" font-weight="600">6</text>
                    <text x="58" y="22" fill="#777" font-size="10.5" font-weight="500">Order Complete</text>
                    <text x="58" y="34" fill="#555" font-size="8">MPGS auth + confirmation</text>
                </g>
            </svg>
        </div>

        <div class="sidebar-footer">
            <div class="env-badge">TEST MODE</div><br>
            Google Pay &middot; MPGS Gateway<br>
            UCP v2026-01-23 &middot; Gateway Encryption
        </div>
    </div>

    <!-- CENTER: CHAT -->
    <div class="chat-area">
        <div class="chat-header">
            <div class="avatar">M</div>
            <div class="info">
                <h3>Meenakshi's Pottery</h3>
                <p>AI-powered checkout &middot; Google UCP + Google Pay</p>
            </div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-bar">
            <input type="text" id="userInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')handleUserInput()" />
            <button onclick="handleUserInput()">&#x2191;</button>
        </div>
    </div>

    <!-- RIGHT: API LOG -->
    <div class="api-panel">
        <div class="api-panel-header">
            <span>&#x1f4e1;</span> API Request Log (UCP + MPGS)
        </div>
        <div class="api-log-entries" id="apiLog"></div>
    </div>

</div>

<script>
// State
let currentSession = null;
let selectedProduct = null;
let paymentsClient = null;
let flowState = 'init';

const POTTERY_EMOJI = { 'nike-am90-black-10': '\u{1FAD6}', 'sony-wh1000xm5': '\u{1F3BA}', 'dyson-v15': '\u{1F3FA}' };

// Google Pay Config
const GPAY_CONFIG = { environment: 'TEST', merchantId: 'BCR2DN4T7654321', merchantName: "Meenakshi's Pottery", gateway: 'mpgs', gatewayMerchantId: 'TESTMPGSMERCHANT' };
const baseCardPaymentMethod = { type: 'CARD', parameters: { allowedAuthMethods: ['PAN_ONLY', 'CRYPTOGRAM_3DS'], allowedCardNetworks: ['VISA', 'MASTERCARD', 'AMEX', 'DISCOVER'] } };
const tokenizationSpecification = { type: 'PAYMENT_GATEWAY', parameters: { gateway: GPAY_CONFIG.gateway, gatewayMerchantId: GPAY_CONFIG.gatewayMerchantId } };
const cardPaymentMethod = { ...baseCardPaymentMethod, tokenizationSpecification };

// --- Animated SVG Flow Infographic ---
const FLOW_STEPS = ['discovery', 'catalog', 'session', 'configure', 'gpay', 'complete'];
let activeParticleIntervals = [];

function setFlowStep(step) {
    const idx = FLOW_STEPS.indexOf(step);
    const svg = document.querySelector('.flow-infographic svg');
    if (!svg) return;

    // Clear old particle animations
    activeParticleIntervals.forEach(id => clearInterval(id));
    activeParticleIntervals = [];
    const particlesG = document.getElementById('particles');
    if (particlesG) particlesG.innerHTML = '';

    FLOW_STEPS.forEach((s, i) => {
        const node = document.getElementById(`svg-${s}`);
        const path = document.getElementById(`path-${i + 1}`);
        if (!node) return;

        const circle = node.querySelector('circle');
        const numText = node.querySelector('text');
        const labelText = node.querySelectorAll('text')[1];
        const subText = node.querySelectorAll('text')[2];

        if (i < idx) {
            // Done state
            circle.setAttribute('fill', '#4caf50');
            circle.setAttribute('stroke', '#66bb6a');
            circle.setAttribute('filter', 'url(#glowDone)');
            numText.setAttribute('fill', '#fff');
            if (labelText) labelText.setAttribute('fill', '#a8e6cf');
            if (subText) subText.setAttribute('fill', '#6abf77');
            if (path) {
                path.setAttribute('stroke', '#4caf50');
                path.setAttribute('stroke-width', '2');
            }
        } else if (i === idx) {
            // Active state — glowing
            circle.setAttribute('fill', '#c96442');
            circle.setAttribute('stroke', '#e8845e');
            circle.setAttribute('filter', 'url(#glowActive)');
            numText.setAttribute('fill', '#fff');
            if (labelText) labelText.setAttribute('fill', '#fff');
            if (subText) subText.setAttribute('fill', '#c96442');

            // Animate active pulse
            const anim = document.createElementNS('http://www.w3.org/2000/svg', 'animate');
            anim.setAttribute('attributeName', 'r');
            anim.setAttribute('values', '16;18;16');
            anim.setAttribute('dur', '1.5s');
            anim.setAttribute('repeatCount', 'indefinite');
            circle.querySelectorAll('animate').forEach(a => a.remove());
            circle.appendChild(anim);
        } else {
            // Future state
            circle.setAttribute('fill', '#333');
            circle.setAttribute('stroke', '#555');
            circle.removeAttribute('filter');
            numText.setAttribute('fill', '#888');
            if (labelText) labelText.setAttribute('fill', '#777');
            if (subText) subText.setAttribute('fill', '#555');
            circle.querySelectorAll('animate').forEach(a => a.remove());
            if (path) {
                path.setAttribute('stroke', '#333');
                path.setAttribute('stroke-width', '2');
            }
        }

        // Animate flowing particles on active + done paths
        if (path && i < idx) {
            spawnParticles(path, '#4caf50', 2000);
        }
        if (path && i === idx) {
            spawnParticles(path, '#c96442', 800);
        }
    });
}

function spawnParticles(pathEl, color, intervalMs) {
    const particlesG = document.getElementById('particles');
    if (!particlesG) return;

    function createParticle() {
        const pathLen = pathEl.getTotalLength();
        const particle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        particle.setAttribute('r', '3');
        particle.setAttribute('fill', color);
        particle.setAttribute('opacity', '0');

        // Glow
        const filt = color === '#c96442' ? 'url(#glowActive)' : 'url(#glowDone)';
        particle.setAttribute('filter', filt);
        particlesG.appendChild(particle);

        let start = null;
        const duration = 600;
        function animate(ts) {
            if (!start) start = ts;
            const progress = (ts - start) / duration;
            if (progress >= 1) {
                particle.remove();
                return;
            }
            const pt = pathEl.getPointAtLength(progress * pathLen);
            particle.setAttribute('cx', pt.x);
            particle.setAttribute('cy', pt.y);
            // Fade in/out
            const opacity = progress < 0.15 ? progress / 0.15 : progress > 0.85 ? (1 - progress) / 0.15 : 1;
            particle.setAttribute('opacity', Math.min(opacity, 0.9));
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    }

    createParticle();
    const id = setInterval(createParticle, intervalMs);
    activeParticleIntervals.push(id);
}

// --- Google Pay ---
function initGooglePay() {
    paymentsClient = new google.payments.api.PaymentsClient({ environment: GPAY_CONFIG.environment });
    paymentsClient.isReadyToPay({ apiVersion: 2, apiVersionMinor: 0, allowedPaymentMethods: [baseCardPaymentMethod] })
        .then(r => { if (r.result) logApi('GPAY', 'isReadyToPay', 200, { result: true }); })
        .catch(e => logApi('GPAY', 'isReadyToPay', 500, { error: e.message }));
}

// --- Chat Helpers ---
function addMsg(type, content) {
    const chat = document.getElementById('chatMessages');
    const msg = document.createElement('div');
    msg.className = `msg ${type}`;
    let label = type === 'agent' ? "Meenakshi's Pottery" : type === 'user' ? 'You' : '';
    msg.innerHTML = (label ? `<div class="msg-label">${label}</div>` : '') + `<div class="msg-bubble">${escapeHtml(content)}</div>`;
    removeTyping(chat);
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
    return msg;
}
function addHtmlMsg(type, html) {
    const chat = document.getElementById('chatMessages');
    const msg = document.createElement('div');
    msg.className = `msg ${type}`;
    let label = type === 'agent' ? "Meenakshi's Pottery" : type === 'user' ? 'You' : '';
    msg.innerHTML = (label ? `<div class="msg-label">${label}</div>` : '') + `<div class="msg-bubble">${html}</div>`;
    removeTyping(chat);
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
    return msg;
}
function addTyping() {
    const chat = document.getElementById('chatMessages');
    removeTyping(chat);
    const msg = document.createElement('div');
    msg.className = 'msg agent typing-indicator';
    msg.innerHTML = `<div class="msg-label">Meenakshi's Pottery</div><div class="msg-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}
function removeTyping(chat) { const t = chat.querySelector('.typing-indicator'); if (t) t.remove(); }
function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }

// --- API ---
async function apiCall(method, url, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const start = Date.now();
    const res = await fetch(url, opts);
    const data = await res.json();
    logApi(method, url, res.status, data, Date.now() - start);
    return { status: res.status, data };
}
function logApi(method, url, status, data, ms) {
    const log = document.getElementById('apiLog');
    const sc = status >= 200 && status < 300 ? 'status-ok' : 'status-err';
    const e = document.createElement('div');
    e.className = 'log-entry';
    e.innerHTML = `<div class="le-head"><span class="method">${method}</span><span class="url">${url}</span><span class="${sc}">[${status}]</span>${ms ? `<span class="timing">${ms}ms</span>` : ''}</div><div class="body">${JSON.stringify(data, null, 2).substring(0, 600)}</div>`;
    log.prepend(e);
}
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// --- User Input ---
async function handleUserInput() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    addMsg('user', text);
    if (flowState === 'init' || flowState === 'discovery') { await startDiscovery(); }
    else if (flowState === 'catalog' || flowState === 'selecting') { addTyping(); await delay(400); addMsg('agent', "Please select a product from the catalog above by clicking on it."); }
    else if (flowState === 'checkout') {
        if (text.toLowerCase().includes('promo') || text.toLowerCase().includes('demo20')) { await applyPromo('DEMO20'); }
        else { addMsg('agent', "Complete the checkout form above and click 'Buy with Google Pay' to proceed."); }
    }
}

// --- Discovery ---
async function startDiscovery() {
    flowState = 'discovery';
    setFlowStep('discovery');
    addTyping(); await delay(500);
    addMsg('agent', "Welcome! Let me discover what's available through Google's Universal Checkout Protocol...");
    addTyping(); await delay(400);
    const { data: profile } = await apiCall('GET', '/.well-known/ucp');
    await delay(200);
    addHtmlMsg('agent',
        `<strong>UCP Discovery complete</strong>\n\n` +
        `Merchant: ${escapeHtml(profile.merchant.name)}\n` +
        `Capabilities: ${profile.capabilities.join(', ')}\n` +
        `Payment: Google Pay (${profile.payment_handlers[0].configuration.environment} mode)\n` +
        `Gateway: ${profile.payment_handlers[0].configuration.tokenization.parameters.gateway.toUpperCase()}\n\n` +
        `Let me load the catalog for you...`
    );
    await delay(400);
    await loadCatalog();
}

// --- Catalog ---
async function loadCatalog() {
    setFlowStep('catalog');
    addTyping(); await delay(300);
    const { data: products } = await apiCall('GET', '/api/products');
    let html = '<strong>Here\'s what we have:</strong><div class="chat-products">';
    products.forEach(p => {
        const emoji = POTTERY_EMOJI[p.sku] || '\u{1F3FA}';
        html += `<div class="chat-product" data-sku="${p.sku}" onclick="selectProduct('${p.sku}')"><div class="prod-emoji">${emoji}</div><div class="prod-name">${escapeHtml(p.name)}</div><div class="prod-price">$${p.price.toFixed(2)}</div><div class="prod-sku">${p.sku}</div></div>`;
    });
    html += '</div>';
    addHtmlMsg('agent', html);
    flowState = 'catalog';
}

// --- Product Selection ---
async function selectProduct(sku) {
    document.querySelectorAll('.chat-product').forEach(el => el.classList.toggle('selected', el.dataset.sku === sku));
    const { data: products } = await apiCall('GET', '/api/products');
    selectedProduct = products.find(p => p.sku === sku);
    if (!selectedProduct) return;
    flowState = 'selecting';
    setFlowStep('session');
    addMsg('user', `I'd like the ${selectedProduct.name}`);
    addTyping(); await delay(400);
    addMsg('agent', `Great choice! Creating checkout session for ${selectedProduct.name}...`);
    addTyping(); await delay(300);
    const { data: session } = await apiCall('POST', '/api/ucp/checkout-sessions', { items: [{ sku: selectedProduct.sku, quantity: 1 }] });
    currentSession = session;
    setFlowStep('configure');
    addMsg('agent', 'Session created! Fill in your details below:');
    await delay(150);
    showInlineCheckout(session);
    flowState = 'checkout';
}

// --- Compact Checkout ---
function showInlineCheckout(session) {
    const html = `
        <div class="chat-checkout" id="inlineCheckout">
            <h4>Configure Your Order</h4>
            <div class="ck-row">
                <div class="ck-group"><label>Full Name</label><input type="text" id="ckName" value="Jane Smith"/></div>
                <div class="ck-group"><label>Email</label><input type="email" id="ckEmail" value="jane@example.com"/></div>
            </div>
            <div class="ck-row full">
                <div class="ck-group"><label>Street Address</label><input type="text" id="ckAddress" value="123 Main Street"/></div>
            </div>
            <div class="ck-row triple">
                <div class="ck-group"><label>City</label><input type="text" id="ckCity" value="San Francisco"/></div>
                <div class="ck-group"><label>State</label><input type="text" id="ckState" value="CA"/></div>
                <div class="ck-group"><label>ZIP</label><input type="text" id="ckZip" value="94105"/></div>
            </div>
            <div class="ck-row">
                <div class="ck-group"><label>Shipping</label>
                    <select id="ckShipping" onchange="updateShipping()">
                        <option value="standard">Standard \u2014 $5.99</option>
                        <option value="express">Express \u2014 $12.99</option>
                        <option value="overnight">Overnight \u2014 $24.99</option>
                    </select>
                </div>
                <div class="ck-group"><label>Promo Code</label>
                    <div class="ck-promo-row" style="margin:0"><input type="text" id="ckPromo" placeholder="DEMO20"/><button onclick="applyPromoFromForm()">Apply</button></div>
                </div>
            </div>
            <div class="ck-summary" id="ckSummary">${renderSummaryHtml(session)}</div>
            <div class="ck-gpay" id="ckGpay"></div>
        </div>`;
    const ckMsg = addHtmlMsg('agent', html);
    const ckBubble = ckMsg.querySelector('.msg-bubble');
    if (ckBubble) ckBubble.classList.add('bubble-form');
    setTimeout(() => {
        const c = document.getElementById('ckGpay');
        if (c && paymentsClient) c.appendChild(paymentsClient.createButton({ onClick: onGooglePayClicked, buttonColor: 'black', buttonType: 'buy', buttonSizeMode: 'fill' }));
    }, 100);
}
function renderSummaryHtml(s) {
    const t = s.totals;
    let h = `<div class="ck-summary-row"><span>Subtotal</span><span>$${t.subtotal.toFixed(2)}</span></div>`;
    h += `<div class="ck-summary-row"><span>Shipping (${escapeHtml(s.shipping_method.name)})</span><span>$${t.shipping.toFixed(2)}</span></div>`;
    h += `<div class="ck-summary-row"><span>Tax</span><span>$${t.tax.toFixed(2)}</span></div>`;
    if (t.discount) h += `<div class="ck-summary-row discount"><span>Discount (${escapeHtml(s.promo_code)})</span><span>-$${t.discount.toFixed(2)}</span></div>`;
    h += `<div class="ck-summary-row total"><span>Total</span><span>$${t.total.toFixed(2)}</span></div>`;
    return h;
}
async function updateShipping() {
    if (!currentSession) return;
    const { data: s } = await apiCall('PUT', `/api/ucp/checkout-sessions/${currentSession.id}`, {
        shipping_address: { name: document.getElementById('ckName').value, address: document.getElementById('ckAddress').value, city: document.getElementById('ckCity').value, state: document.getElementById('ckState').value, zip: document.getElementById('ckZip').value, country: 'US' },
        shipping_method: document.getElementById('ckShipping').value
    });
    currentSession = s;
    const el = document.getElementById('ckSummary');
    if (el) el.innerHTML = renderSummaryHtml(s);
}
async function applyPromoFromForm() { const c = document.getElementById('ckPromo').value.trim(); if (c) await applyPromo(c); }
async function applyPromo(code) {
    if (!currentSession) return;
    const { data: s } = await apiCall('PUT', `/api/ucp/checkout-sessions/${currentSession.id}`, { promo_code: code });
    currentSession = s;
    const el = document.getElementById('ckSummary');
    if (el) el.innerHTML = renderSummaryHtml(s);
    if (s.totals.discount) addMsg('agent', `Promo "${code}" applied! You save $${s.totals.discount.toFixed(2)}. New total: $${s.totals.total.toFixed(2)}`);
    else addMsg('agent', `Sorry, "${code}" isn't a valid promo code.`);
}

// --- Google Pay ---
async function onGooglePayClicked() {
    if (!currentSession) return;
    flowState = 'paying';
    setFlowStep('gpay');
    addMsg('agent', `Total: $${currentSession.totals.total.toFixed(2)}. Requesting Google Pay...`);
    try {
        const pd = await paymentsClient.loadPaymentData({
            apiVersion: 2, apiVersionMinor: 0, allowedPaymentMethods: [cardPaymentMethod],
            transactionInfo: { totalPriceStatus: 'FINAL', totalPrice: currentSession.totals.total.toString(), currencyCode: 'USD', countryCode: 'US' },
            merchantInfo: { merchantId: GPAY_CONFIG.merchantId, merchantName: GPAY_CONFIG.merchantName }
        });
        logApi('GPAY', 'loadPaymentData', 200, { type: pd.paymentMethodData.type, description: pd.paymentMethodData.description, token: '[ENCRYPTED]' });
        addMsg('user', 'Payment confirmed via Google Pay');
        addTyping(); await delay(500);
        addMsg('agent', 'Processing payment through MPGS gateway...');
        await completeCheckout(pd);
    } catch (err) {
        addMsg('system', err.statusCode === 'CANCELED' ? 'Payment cancelled.' : `Google Pay error: ${err.message || JSON.stringify(err)}`);
        flowState = 'checkout';
    }
}

// --- Complete ---
async function completeCheckout(paymentData) {
    addTyping(); await delay(700);
    const { data: r } = await apiCall('POST', `/api/ucp/checkout-sessions/${currentSession.id}/complete`, { paymentData });
    if (r.status === 'completed') {
        flowState = 'done';
        setFlowStep('complete');
        const chat = document.getElementById('chatMessages');
        const msg = document.createElement('div');
        msg.className = 'msg success'; msg.style.maxWidth = '100%'; msg.style.alignSelf = 'center';
        msg.innerHTML = `<div class="msg-bubble">
            <div class="confetti">&#127881;&#127882;&#127881;</div>
            <h3>Congratulations on your order!</h3>
            <p style="margin:0.15rem 0;font-size:0.78rem;">Your order has been placed successfully.</p>
            <div style="background:#fff;border-radius:5px;padding:0.35rem 0.45rem;margin-top:0.3rem;text-align:left;font-size:0.7rem;line-height:1.2;">
                <div style="display:flex;justify-content:space-between;padding:0.12rem 0;"><span>Order</span><strong>${r.order_id}</strong></div>
                <div style="display:flex;justify-content:space-between;padding:0.12rem 0;"><span>Auth</span><strong>${r.session.payment.authorization_code}</strong></div>
                <div style="display:flex;justify-content:space-between;padding:0.12rem 0;"><span>Txn</span><strong>${r.session.payment.transaction_id}</strong></div>
                <div style="display:flex;justify-content:space-between;padding:0.12rem 0;"><span>Gateway</span><strong>MPGS</strong></div>
                <div style="display:flex;justify-content:space-between;padding:0.12rem 0;"><span>Amount</span><strong>$${r.session.totals.total.toFixed(2)}</strong></div>
                <div style="display:flex;justify-content:space-between;padding:0.12rem 0;"><span>Status</span><strong style="color:#2e7d32;">${r.session.payment.status}</strong></div>
            </div>
            <p style="margin-top:0.25rem;font-size:0.62rem;color:#5a8a5e;">Google Pay + MPGS Gateway Encryption</p>
        </div>`;
        removeTyping(chat); chat.appendChild(msg); chat.scrollTop = chat.scrollHeight;
        await delay(400);
        addMsg('agent', `Thank you for shopping at Meenakshi's Pottery! Your ${selectedProduct.name} will be shipped soon.`);
    } else { addMsg('system', 'Payment could not be completed. Please try again.'); flowState = 'checkout'; }
}

// --- Boot ---
window.addEventListener('load', () => {
    addMsg('system', "Meenakshi's Pottery \u2014 AI Checkout Demo (Google UCP + Google Pay + MPGS)");
    addMsg('agent', "Hello! Welcome to Meenakshi's Pottery. I can help you browse our collection and complete a purchase using Google Pay.\n\nType anything or say 'hi' to get started!");
    flowState = 'init';
    const tryInit = () => { if (typeof google !== 'undefined' && google.payments) initGooglePay(); else setTimeout(tryInit, 200); };
    tryInit();
});
</script>
